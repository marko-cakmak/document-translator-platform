services:
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: document_translator_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: document_translator_backend
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
    working_dir: /app
    env_file:
      - ./backend/.env
    depends_on:
      - database

  database:
    image: postgres:17-alpine
    container_name: document_translator_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: document_translator_db
      POSTGRES_USER: document_translator_user
      POSTGRES_PASSWORD: document_translator_password
    ports:
      - "5433:5432"
    volumes:
      - document_translator_postgres_data:/var/lib/postgresql/data

volumes:
  document_translator_postgres_data: